<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <!--
    箭头链流程模板 (Chevron Process)
    用途: 线性阶段流程、逐步推进、方法论展示、整块阶段箭头参考
    适用场景: 销售漏斗阶段、项目阶段、方法论步骤
    支持: 5阶段横向箭头 (推荐3-6)
    复用建议:
      - 当页面需要“整块粗箭头”表达阶段推进时，优先参考此模板中的 polygon 箭头结构
      - 不要用 marker-end 模拟这类宽箭身箭头

    可复用片段 1: 五边形 chevron（阶段箭头）
      <polygon points="40,0 220,0 260,48 220,96 40,96 80,48"
               fill="#6C5CE7"/>

    可复用片段 2: 带长箭头头部的 block arrow（结论指向）
      <path d="M60,10 H300 V-36 L470,80 L300,196 V150 H60 Z"
            fill="#5D96E4" stroke="#3F76C8" stroke-width="4"/>
    -->

    <defs>
        <filter id="chevronShadow" x="-10%" y="-20%" width="120%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
            <feOffset dx="2" dy="3" result="offsetblur"/>
            <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
            <feOffset dx="0" dy="2" result="offsetblur"/>
            <feComponentTransfer><feFuncA type="linear" slope="0.1"/></feComponentTransfer>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>

    <rect width="1280" height="720" fill="#FFFFFF"/>

    <!-- 标题 -->
    <text x="640" y="55" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="30" font-weight="700" fill="#1A252F">数字化转型方法论</text>
    <text x="640" y="82" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" fill="#7F8C8D">Chevron Process · 五阶段递进推进框架</text>

    <!-- 箭头1 (最左) -->
    <polygon points="40,220 200,220 230,265 200,310 40,310" fill="#6C5CE7" filter="url(#chevronShadow)"/>
    <text x="130" y="260" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" font-weight="700" fill="#FFFFFF">诊断评估</text>
    <text x="130" y="280" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="10" fill="#FFFFFF" fill-opacity="0.8">PHASE 01</text>

    <!-- 箭头2 -->
    <polygon points="235,220 400,220 430,265 400,310 235,310 265,265" fill="#A29BFE" filter="url(#chevronShadow)"/>
    <text x="330" y="260" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" font-weight="700" fill="#FFFFFF">规划设计</text>
    <text x="330" y="280" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="10" fill="#FFFFFF" fill-opacity="0.8">PHASE 02</text>

    <!-- 箭头3 -->
    <polygon points="435,220 610,220 640,265 610,310 435,310 465,265" fill="#0984E3" filter="url(#chevronShadow)"/>
    <text x="533" y="260" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" font-weight="700" fill="#FFFFFF">试点验证</text>
    <text x="533" y="280" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="10" fill="#FFFFFF" fill-opacity="0.8">PHASE 03</text>

    <!-- 箭头4 -->
    <polygon points="645,220 830,220 860,265 830,310 645,310 675,265" fill="#00B894" filter="url(#chevronShadow)"/>
    <text x="748" y="260" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" font-weight="700" fill="#FFFFFF">规模推广</text>
    <text x="748" y="280" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="10" fill="#FFFFFF" fill-opacity="0.8">PHASE 04</text>

    <!-- 箭头5 -->
    <polygon points="865,220 1060,220 1090,265 1060,310 865,310 895,265" fill="#E17055" filter="url(#chevronShadow)"/>
    <text x="973" y="260" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" font-weight="700" fill="#FFFFFF">持续优化</text>
    <text x="973" y="280" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="10" fill="#FFFFFF" fill-opacity="0.8">PHASE 05</text>

    <!-- 阶段时长条 -->
    <rect x="40" y="325" width="190" height="20" rx="4" fill="#6C5CE7" fill-opacity="0.15"/>
    <text x="135" y="339" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="10" font-weight="600" fill="#6C5CE7">2-4周</text>
    <rect x="245" y="325" width="195" height="20" rx="4" fill="#A29BFE" fill-opacity="0.15"/>
    <text x="342" y="339" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="10" font-weight="600" fill="#A29BFE">4-6周</text>
    <rect x="450" y="325" width="195" height="20" rx="4" fill="#0984E3" fill-opacity="0.15"/>
    <text x="547" y="339" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="10" font-weight="600" fill="#0984E3">8-12周</text>
    <rect x="655" y="325" width="210" height="20" rx="4" fill="#00B894" fill-opacity="0.15"/>
    <text x="760" y="339" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="10" font-weight="600" fill="#00B894">12-16周</text>
    <rect x="875" y="325" width="215" height="20" rx="4" fill="#E17055" fill-opacity="0.15"/>
    <text x="982" y="339" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="10" font-weight="600" fill="#E17055">持续</text>

    <!-- 详情卡片行 -->
    <!-- 卡片1 -->
    <g filter="url(#cardShadow)">
        <rect x="40" y="370" width="190" height="290" rx="10" fill="#FFFFFF"/>
        <rect x="40" y="370" width="190" height="5" rx="3" fill="#6C5CE7"/>
        <text x="135" y="405" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
              font-size="15" font-weight="700" fill="#1A252F">诊断评估</text>
        <line x1="65" y1="420" x2="205" y2="420" stroke="#F0F0F0" stroke-width="1"/>
        <text x="60" y="445" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5F6368">· 现状能力评估</text>
        <text x="60" y="468" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5F6368">· 痛点问题识别</text>
        <text x="60" y="491" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5F6368">· 成熟度测评</text>
        <text x="60" y="514" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5F6368">· 目标差距分析</text>
        <line x1="65" y1="535" x2="205" y2="535" stroke="#F0F0F0" stroke-width="1"/>
        <text x="60" y="560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#6C5CE7">交付物:</text>
        <text x="60" y="580" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#95A5A6">诊断报告</text>
        <text x="60" y="598" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#95A5A6">能力成熟度评分卡</text>
    </g>

    <!-- 卡片2 -->
    <g filter="url(#cardShadow)">
        <rect x="250" y="370" width="190" height="290" rx="10" fill="#FFFFFF"/>
        <rect x="250" y="370" width="190" height="5" rx="3" fill="#A29BFE"/>
        <text x="345" y="405" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
              font-size="15" font-weight="700" fill="#1A252F">规划设计</text>
        <line x1="275" y1="420" x2="415" y2="420" stroke="#F0F0F0" stroke-width="1"/>
        <text x="270" y="445" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5F6368">· 顶层架构设计</text>
        <text x="270" y="468" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5F6368">· 技术选型评估</text>
        <text x="270" y="491" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5F6368">· 路线图编制</text>
        <text x="270" y="514" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5F6368">· 投资回报测算</text>
        <line x1="275" y1="535" x2="415" y2="535" stroke="#F0F0F0" stroke-width="1"/>
        <text x="270" y="560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#A29BFE">交付物:</text>
        <text x="270" y="580" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#95A5A6">转型蓝图</text>
        <text x="270" y="598" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#95A5A6">ROI分析报告</text>
    </g>

    <!-- 卡片3 -->
    <g filter="url(#cardShadow)">
        <rect x="460" y="370" width="190" height="290" rx="10" fill="#FFFFFF"/>
        <rect x="460" y="370" width="190" height="5" rx="3" fill="#0984E3"/>
        <text x="555" y="405" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
              font-size="15" font-weight="700" fill="#1A252F">试点验证</text>
        <line x1="485" y1="420" x2="625" y2="420" stroke="#F0F0F0" stroke-width="1"/>
        <text x="480" y="445" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5F6368">· 选定试点场景</text>
        <text x="480" y="468" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5F6368">· MVP快速上线</text>
        <text x="480" y="491" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5F6368">· 效果数据采集</text>
        <text x="480" y="514" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5F6368">· 用户反馈迭代</text>
        <line x1="485" y1="535" x2="625" y2="535" stroke="#F0F0F0" stroke-width="1"/>
        <text x="480" y="560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#0984E3">交付物:</text>
        <text x="480" y="580" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#95A5A6">试点总结报告</text>
        <text x="480" y="598" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#95A5A6">推广可行性评估</text>
    </g>

    <!-- 卡片4 -->
    <g filter="url(#cardShadow)">
        <rect x="670" y="370" width="190" height="290" rx="10" fill="#FFFFFF"/>
        <rect x="670" y="370" width="190" height="5" rx="3" fill="#00B894"/>
        <text x="765" y="405" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
              font-size="15" font-weight="700" fill="#1A252F">规模推广</text>
        <line x1="695" y1="420" x2="835" y2="420" stroke="#F0F0F0" stroke-width="1"/>
        <text x="690" y="445" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5F6368">· 全业务线推广</text>
        <text x="690" y="468" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5F6368">· 组织变革配套</text>
        <text x="690" y="491" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5F6368">· 培训赋能计划</text>
        <text x="690" y="514" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5F6368">· 标准化流程建设</text>
        <line x1="695" y1="535" x2="835" y2="535" stroke="#F0F0F0" stroke-width="1"/>
        <text x="690" y="560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#00B894">交付物:</text>
        <text x="690" y="580" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#95A5A6">推广实施方案</text>
        <text x="690" y="598" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#95A5A6">组织能力建设手册</text>
    </g>

    <!-- 卡片5 -->
    <g filter="url(#cardShadow)">
        <rect x="880" y="370" width="190" height="290" rx="10" fill="#FFFFFF"/>
        <rect x="880" y="370" width="190" height="5" rx="3" fill="#E17055"/>
        <text x="975" y="405" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
              font-size="15" font-weight="700" fill="#1A252F">持续优化</text>
        <line x1="905" y1="420" x2="1045" y2="420" stroke="#F0F0F0" stroke-width="1"/>
        <text x="900" y="445" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5F6368">· 运营效果监测</text>
        <text x="900" y="468" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5F6368">· 数据驱动优化</text>
        <text x="900" y="491" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5F6368">· 技术迭代升级</text>
        <text x="900" y="514" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5F6368">· 新场景拓展</text>
        <line x1="905" y1="535" x2="1045" y2="535" stroke="#F0F0F0" stroke-width="1"/>
        <text x="900" y="560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#E17055">交付物:</text>
