<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <!-- 
    循环流程图模板
    用途: 循环往复流程、PDCA、迭代周期
    适用场景: 质量管理循环、敏捷迭代、业务闭环
    支持: 5阶段循环 (推荐4-6个)
    -->
    
    <defs>
        <!-- 节点阴影 -->
        <filter id="nodeShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
            <feOffset dx="0" dy="3" result="offsetblur"/>
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.15"/>
            </feComponentTransfer>
            <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        
        <!-- 卡片阴影 -->
        <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
            <feOffset dx="0" dy="2" result="offsetblur"/>
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.1"/>
            </feComponentTransfer>
            <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <!-- 背景 -->
    <rect width="1280" height="720" fill="#FFFFFF"/>
    
    <!-- 标题区域 -->
    <text x="60" y="70" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="32" font-weight="700" fill="#1A252F" letter-spacing="-0.5">持续改进循环</text>
    <text x="60" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="16" fill="#7F8C8D">Continuous Improvement Cycle · 五阶段闭环驱动</text>
    
    <!-- 中心引导圆环 (虚线) -->
    <circle cx="480" cy="410" r="200" fill="none" stroke="#E0E0E0" stroke-width="2" stroke-dasharray="8,4"/>
    <circle cx="480" cy="410" r="130" fill="none" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4,4"/>
    
    <!-- 中心文字 -->
    <text x="480" y="400" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="20" font-weight="800" fill="#2C3E50">持续循环</text>
    <text x="480" y="425" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="13" fill="#95A5A6">Continuous Loop</text>
    
    <!-- 5个节点沿圆环分布 (圆心480,410 r=200) -->
    <!-- 位置: 顶(480,210), 右上(670,350), 右下(600,570), 左下(360,570), 左上(290,350) -->
    
    <!-- 连接弧线箭头 (用弯曲path + polygon三角) -->
    <!-- 1→2 -->
    <path d="M 510,220 Q 620,240 650,340" stroke="#6C5CE7" stroke-width="2.5" fill="none" stroke-opacity="0.5"/>
    <polygon points="655,340 645,332 648,348" fill="#6C5CE7" fill-opacity="0.6"/>
    
    <!-- 2→3 -->
    <path d="M 670,380 Q 680,480 610,555" stroke="#00B894" stroke-width="2.5" fill="none" stroke-opacity="0.5"/>
    <polygon points="605,558 618,552 610,565" fill="#00B894" fill-opacity="0.6"/>
    
    <!-- 3→4 -->
    <path d="M 575,580 Q 480,620 375,575" stroke="#FDCB6E" stroke-width="2.5" fill="none" stroke-opacity="0.5"/>
    <polygon points="372,572 380,584 368,580" fill="#FDCB6E" fill-opacity="0.6"/>
    
    <!-- 4→5 -->
    <path d="M 340,555 Q 280,470 285,365" stroke="#E17055" stroke-width="2.5" fill="none" stroke-opacity="0.5"/>
    <polygon points="287,360 278,372 294,368" fill="#E17055" fill-opacity="0.6"/>
    
    <!-- 5→1 -->
    <path d="M 310,340 Q 340,250 460,215" stroke="#0984E3" stroke-width="2.5" fill="none" stroke-opacity="0.5"/>
    <polygon points="462,213 452,206 454,222" fill="#0984E3" fill-opacity="0.6"/>
    
    <!-- 节点1: 调研分析 (顶部) -->
    <circle cx="480" cy="210" r="45" fill="#6C5CE7" filter="url(#nodeShadow)"/>
    <text x="480" y="205" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="28" font-weight="700" fill="#FFFFFF">01</text>
    <text x="480" y="228" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="11" font-weight="600" fill="#FFFFFF" fill-opacity="0.85">调研分析</text>
    
    <!-- 节点2: 方案设计 (右上) -->
    <circle cx="670" cy="355" r="45" fill="#00B894" filter="url(#nodeShadow)"/>
    <text x="670" y="350" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="28" font-weight="700" fill="#FFFFFF">02</text>
    <text x="670" y="373" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="11" font-weight="600" fill="#FFFFFF" fill-opacity="0.85">方案设计</text>
    
    <!-- 节点3: 执行落地 (右下) -->
    <circle cx="600" cy="570" r="45" fill="#FDCB6E" filter="url(#nodeShadow)"/>
    <text x="600" y="565" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="28" font-weight="700" fill="#FFFFFF">03</text>
    <text x="600" y="588" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="11" font-weight="600" fill="#FFFFFF" fill-opacity="0.85">执行落地</text>
    
    <!-- 节点4: 效果评估 (左下) -->
    <circle cx="360" cy="570" r="45" fill="#E17055" filter="url(#nodeShadow)"/>
    <text x="360" y="565" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="28" font-weight="700" fill="#FFFFFF">04</text>
    <text x="360" y="588" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="11" font-weight="600" fill="#FFFFFF" fill-opacity="0.85">效果评估</text>
    
    <!-- 节点5: 迭代优化 (左上) -->
    <circle cx="290" cy="355" r="45" fill="#0984E3" filter="url(#nodeShadow)"/>
    <text x="290" y="350" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="28" font-weight="700" fill="#FFFFFF">05</text>
    <text x="290" y="373" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="11" font-weight="600" fill="#FFFFFF" fill-opacity="0.85">迭代优化</text>
    
    <!-- 右侧说明面板 -->
    <g filter="url(#cardShadow)">
        <rect x="780" y="150" width="440" height="75" rx="8" fill="#FFFFFF"/>
        <rect x="780" y="150" width="5" height="75" rx="3" fill="#6C5CE7"/>
        <text x="802" y="178" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="15" font-weight="700" fill="#6C5CE7">01 调研分析</text>
        <text x="802" y="202" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="12" fill="#7F8C8D">深入了解现状，收集数据与用户反馈</text>
    </g>
    
    <g filter="url(#cardShadow)">
        <rect x="780" y="240" width="440" height="75" rx="8" fill="#FFFFFF"/>
        <rect x="780" y="240" width="5" height="75" rx="3" fill="#00B894"/>
        <text x="802" y="268" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="15" font-weight="700" fill="#00B894">02 方案设计</text>
        <text x="802" y="292" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="12" fill="#7F8C8D">制定改进方案，明确目标与关键路径</text>
    </g>
    
    <g filter="url(#cardShadow)">
        <rect x="780" y="330" width="440" height="75" rx="8" fill="#FFFFFF"/>
        <rect x="780" y="330" width="5" height="75" rx="3" fill="#FDCB6E"/>
        <text x="802" y="358" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="15" font-weight="700" fill="#D4A537">03 执行落地</text>
        <text x="802" y="382" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="12" fill="#7F8C8D">推进方案实施，协调资源与跟踪进度</text>
    </g>
    
    <g filter="url(#cardShadow)">
        <rect x="780" y="420" width="440" height="75" rx="8" fill="#FFFFFF"/>
        <rect x="780" y="420" width="5" height="75" rx="3" fill="#E17055"/>
        <text x="802" y="448" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="15" font-weight="700" fill="#E17055">04 效果评估</text>
        <text x="802" y="472" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="12" fill="#7F8C8D">量化成果输出，对比目标达成率</text>
    </g>
    
    <g filter="url(#cardShadow)">
        <rect x="780" y="510" width="440" height="75" rx="8" fill="#FFFFFF"/>
        <rect x="780" y="510" width="5" height="75" rx="3" fill="#0984E3"/>
        <text x="802" y="538" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="15" font-weight="700" fill="#0984E3">05 迭代优化</text>
        <text x="802" y="562" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="12" fill="#7F8C8D">总结经验教训，进入下一轮改进循环</text>
    </g>

    <!-- 底部注释 -->
    <text x="60" y="690" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="12" fill="#BDC3C7">每完成一个循环，整体能力向上跃迁一个台阶</text>
</svg>