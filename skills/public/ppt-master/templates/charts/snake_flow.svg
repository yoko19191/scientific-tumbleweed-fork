<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <!--
    蛇形流程图模板
    用途: S型蜿蜒步骤、长流程展示
    适用场景: 用户旅程、客户生命周期、多阶段流程
    支持: 8步蛇形 (推荐6-10步)
    -->

    <defs>
        <filter id="nodeShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
            <feOffset dx="0" dy="2" result="offsetblur"/>
            <feComponentTransfer><feFuncA type="linear" slope="0.12"/></feComponentTransfer>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>

    <rect width="1280" height="720" fill="#FFFFFF"/>

    <!-- 标题 -->
    <text x="640" y="55" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="30" font-weight="700" fill="#1A252F">客户生命周期旅程</text>
    <text x="640" y="82" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" fill="#7F8C8D">Customer Journey · 8个关键触点的蛇形流程</text>

    <!-- 蛇形连接线 -->
    <!-- 第一行: 左→右 (y=195) -->
    <line x1="195" y1="195" x2="1085" y2="195" stroke="#E0E0E0" stroke-width="3" stroke-linecap="round"/>
    <!-- 折返1: 右侧下行 -->
    <path d="M 1085,195 Q 1140,195 1140,270 Q 1140,345 1085,345" stroke="#E0E0E0" stroke-width="3" fill="none"/>
    <!-- 第二行: 右→左 (y=345) -->
    <line x1="1085" y1="345" x2="195" y2="345" stroke="#E0E0E0" stroke-width="3" stroke-linecap="round"/>
    <!-- 折返2: 左侧下行 -->
    <path d="M 195,345 Q 140,345 140,420 Q 140,495 195,495" stroke="#E0E0E0" stroke-width="3" fill="none"/>
    <!-- 第三行: 左→右 (y=495) -->
    <line x1="195" y1="495" x2="790" y2="495" stroke="#E0E0E0" stroke-width="3" stroke-linecap="round"/>

    <!-- 节点+箭头 -->
    <!-- 第一行 4个: x=195,492,789,1086 -->
    <polygon points="340,195 328,185 328,205" fill="#D5D8DC"/>
    <polygon points="637,195 625,185 625,205" fill="#D5D8DC"/>
    <polygon points="934,195 922,185 922,205" fill="#D5D8DC"/>

    <!-- 第二行反向 4个: x=1086,789,492,195 -->
    <polygon points="940,345 952,335 952,355" fill="#D5D8DC"/>
    <polygon points="643,345 655,335 655,355" fill="#D5D8DC"/>
    <polygon points="346,345 358,335 358,355" fill="#D5D8DC"/>

    <!-- 第三行 2个: x=195,492 -->
    <polygon points="340,495 328,485 328,505" fill="#D5D8DC"/>
    <polygon points="637,495 625,485 625,505" fill="#D5D8DC"/>

    <!-- 步骤1 -->
    <circle cx="195" cy="195" r="30" fill="#6C5CE7" filter="url(#nodeShadow)"/>
    <text x="195" y="200" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="18" font-weight="800" fill="#FFFFFF">01</text>
    <text x="195" y="248" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="13" font-weight="700" fill="#1A252F">品牌认知</text>
    <text x="195" y="266" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="11" fill="#7F8C8D">广告触达用户</text>

    <!-- 步骤2 -->
    <circle cx="492" cy="195" r="30" fill="#A29BFE" filter="url(#nodeShadow)"/>
    <text x="492" y="200" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="18" font-weight="800" fill="#FFFFFF">02</text>
    <text x="492" y="248" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="13" font-weight="700" fill="#1A252F">兴趣激发</text>
    <text x="492" y="266" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="11" fill="#7F8C8D">内容种草引导</text>

    <!-- 步骤3 -->
    <circle cx="789" cy="195" r="30" fill="#74B9FF" filter="url(#nodeShadow)"/>
    <text x="789" y="200" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="18" font-weight="800" fill="#FFFFFF">03</text>
    <text x="789" y="248" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="13" font-weight="700" fill="#1A252F">考虑对比</text>
    <text x="789" y="266" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="11" fill="#7F8C8D">产品评测对比</text>

    <!-- 步骤4 -->
    <circle cx="1086" cy="195" r="30" fill="#00B894" filter="url(#nodeShadow)"/>
    <text x="1086" y="200" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="18" font-weight="800" fill="#FFFFFF">04</text>
    <text x="1086" y="248" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="13" font-weight="700" fill="#1A252F">首次购买</text>
    <text x="1086" y="266" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="11" fill="#7F8C8D">下单转化</text>

    <!-- 步骤5 (第二行右起) -->
    <circle cx="1086" cy="345" r="30" fill="#55EFC4" filter="url(#nodeShadow)"/>
    <text x="1086" y="350" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="18" font-weight="800" fill="#FFFFFF">05</text>
    <text x="1086" y="398" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="13" font-weight="700" fill="#1A252F">使用体验</text>
    <text x="1086" y="416" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="11" fill="#7F8C8D">产品交付使用</text>

    <!-- 步骤6 -->
    <circle cx="789" cy="345" r="30" fill="#FDCB6E" filter="url(#nodeShadow)"/>
    <text x="789" y="350" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="18" font-weight="800" fill="#FFFFFF">06</text>
    <text x="789" y="398" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="13" font-weight="700" fill="#1A252F">售后服务</text>
    <text x="789" y="416" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="11" fill="#7F8C8D">问题响应解决</text>

    <!-- 步骤7 -->
    <circle cx="492" cy="345" r="30" fill="#E17055" filter="url(#nodeShadow)"/>
    <text x="492" y="350" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="18" font-weight="800" fill="#FFFFFF">07</text>
    <text x="492" y="398" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="13" font-weight="700" fill="#1A252F">忠诚复购</text>
    <text x="492" y="416" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="11" fill="#7F8C8D">二次购买转化</text>

    <!-- 步骤8 -->
    <circle cx="195" cy="345" r="30" fill="#D63031" filter="url(#nodeShadow)"/>
    <text x="195" y="350" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="18" font-weight="800" fill="#FFFFFF">08</text>
    <text x="195" y="398" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="13" font-weight="700" fill="#1A252F">口碑传播</text>
    <text x="195" y="416" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="11" fill="#7F8C8D">裂变推荐新客</text>

    <!-- 底部总结 -->
    <rect x="120" y="560" width="1040" height="65" rx="10" fill="#F8F9FA"/>
    <text x="640" y="590" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="15" font-weight="700" fill="#1A252F">全生命周期闭环</text>
    <text x="640" y="612" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12" fill="#7F8C8D">从品牌认知到口碑传播，形成自增长飞轮，平均客户 LTV 提升 3.2 倍</text>

    <text x="640" y="690" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12" fill="#BDC3C7">每个触点的体验优化都会提升整体转化漏斗效率</text>
</svg>