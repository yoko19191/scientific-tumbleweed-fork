<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <!--
    思维导图模板
    用途: 中心主题发散、知识结构、头脑风暴
    适用场景: 主题拆解、知识体系、会议纪要梳理
    支持: 1中心+4分支 (推荐3-6分支)
    -->

    <defs>
        <filter id="nodeShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
            <feOffset dx="0" dy="2" result="offsetblur"/>
            <feComponentTransfer><feFuncA type="linear" slope="0.12"/></feComponentTransfer>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#F8F9FA;stop-opacity:1"/>
            <stop offset="100%" style="stop-color:#EEF1F5;stop-opacity:1"/>
        </linearGradient>
        <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#6C5CE7;stop-opacity:1"/>
            <stop offset="100%" style="stop-color:#A29BFE;stop-opacity:1"/>
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="url(#bgGrad)"/>

    <!-- 标题 -->
    <text x="60" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="28" font-weight="700" fill="#1A252F">产品战略思维导图</text>
    <text x="60" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" fill="#7F8C8D">Mind Map · 核心战略四大维度拆解</text>

    <!-- 连接线 (曲线) -->
    <!-- 中心→右上(产品) -->
    <path d="M 660,360 Q 780,280 870,210" stroke="#00B894" stroke-width="3" fill="none" stroke-opacity="0.5"/>
    <!-- 中心→右下(市场) -->
    <path d="M 660,370 Q 790,430 870,500" stroke="#FDCB6E" stroke-width="3" fill="none" stroke-opacity="0.5"/>
    <!-- 中心→左上(技术) -->
    <path d="M 580,350 Q 460,270 380,200" stroke="#74B9FF" stroke-width="3" fill="none" stroke-opacity="0.5"/>
    <!-- 中心→左下(运营) -->
    <path d="M 580,380 Q 450,440 370,510" stroke="#E17055" stroke-width="3" fill="none" stroke-opacity="0.5"/>

    <!-- 分支→子节点 连接线 -->
    <!-- 产品分支 -->
    <line x1="970" y1="190" x2="1050" y2="140" stroke="#00B894" stroke-width="1.5" stroke-opacity="0.35"/>
    <line x1="970" y1="210" x2="1050" y2="210" stroke="#00B894" stroke-width="1.5" stroke-opacity="0.35"/>
    <line x1="970" y1="230" x2="1050" y2="280" stroke="#00B894" stroke-width="1.5" stroke-opacity="0.35"/>
    <!-- 市场分支 -->
    <line x1="970" y1="490" x2="1050" y2="440" stroke="#FDCB6E" stroke-width="1.5" stroke-opacity="0.35"/>
    <line x1="970" y1="510" x2="1050" y2="510" stroke="#FDCB6E" stroke-width="1.5" stroke-opacity="0.35"/>
    <line x1="970" y1="530" x2="1050" y2="580" stroke="#FDCB6E" stroke-width="1.5" stroke-opacity="0.35"/>
    <!-- 技术分支 -->
    <line x1="280" y1="190" x2="200" y2="140" stroke="#74B9FF" stroke-width="1.5" stroke-opacity="0.35"/>
    <line x1="280" y1="210" x2="200" y2="210" stroke="#74B9FF" stroke-width="1.5" stroke-opacity="0.35"/>
    <line x1="280" y1="230" x2="200" y2="280" stroke="#74B9FF" stroke-width="1.5" stroke-opacity="0.35"/>
    <!-- 运营分支 -->
    <line x1="280" y1="500" x2="200" y2="450" stroke="#E17055" stroke-width="1.5" stroke-opacity="0.35"/>
    <line x1="280" y1="520" x2="200" y2="520" stroke="#E17055" stroke-width="1.5" stroke-opacity="0.35"/>
    <line x1="280" y1="540" x2="200" y2="590" stroke="#E17055" stroke-width="1.5" stroke-opacity="0.35"/>

    <!-- 中心节点 -->
    <circle cx="620" cy="365" r="65" fill="url(#centerGrad)" filter="url(#nodeShadow)"/>
    <text x="620" y="358" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="18" font-weight="800" fill="#FFFFFF">产品</text>
    <text x="620" y="382" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="18" font-weight="800" fill="#FFFFFF">战略</text>

    <!-- 分支1: 产品 (右上) -->
    <rect x="870" y="170" width="100" height="60" rx="30" fill="#00B894" filter="url(#nodeShadow)"/>
    <text x="920" y="207" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="15" font-weight="700" fill="#FFFFFF">产品</text>
    <!-- 子节点 -->
    <rect x="1050" y="122" width="170" height="36" rx="18" fill="#FFFFFF" filter="url(#nodeShadow)"/>
    <rect x="1050" y="122" width="5" height="36" rx="3" fill="#00B894"/>
    <text x="1070" y="146" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#2C3E50">用户体验优化</text>
    <rect x="1050" y="192" width="170" height="36" rx="18" fill="#FFFFFF" filter="url(#nodeShadow)"/>
    <rect x="1050" y="192" width="5" height="36" rx="3" fill="#00B894"/>
    <text x="1070" y="216" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#2C3E50">功能迭代路线</text>
    <rect x="1050" y="262" width="170" height="36" rx="18" fill="#FFFFFF" filter="url(#nodeShadow)"/>
    <rect x="1050" y="262" width="5" height="36" rx="3" fill="#00B894"/>
    <text x="1070" y="286" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#2C3E50">质量标准体系</text>

    <!-- 分支2: 市场 (右下) -->
    <rect x="870" y="480" width="100" height="60" rx="30" fill="#D4A537" filter="url(#nodeShadow)"/>
    <text x="920" y="517" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="15" font-weight="700" fill="#FFFFFF">市场</text>
    <rect x="1050" y="422" width="170" height="36" rx="18" fill="#FFFFFF" filter="url(#nodeShadow)"/>
    <rect x="1050" y="422" width="5" height="36" rx="3" fill="#D4A537"/>
    <text x="1070" y="446" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#2C3E50">品牌定位策略</text>
    <rect x="1050" y="492" width="170" height="36" rx="18" fill="#FFFFFF" filter="url(#nodeShadow)"/>
    <rect x="1050" y="492" width="5" height="36" rx="3" fill="#D4A537"/>
    <text x="1070" y="516" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#2C3E50">渠道拓展计划</text>
    <rect x="1050" y="562" width="170" height="36" rx="18" fill="#FFFFFF" filter="url(#nodeShadow)"/>
    <rect x="1050" y="562" width="5" height="36" rx="3" fill="#D4A537"/>
    <text x="1070" y="586" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#2C3E50">竞品分析跟踪</text>

    <!-- 分支3: 技术 (左上) -->
    <rect x="280" y="170" width="100" height="60" rx="30" fill="#74B9FF" filter="url(#nodeShadow)"/>
    <text x="330" y="207" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="15" font-weight="700" fill="#FFFFFF">技术</text>
    <rect x="30" y="122" width="170" height="36" rx="18" fill="#FFFFFF" filter="url(#nodeShadow)"/>
    <rect x="195" y="122" width="5" height="36" rx="3" fill="#74B9FF"/>
    <text x="48" y="146" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#2C3E50">架构升级方案</text>
    <rect x="30" y="192" width="170" height="36" rx="18" fill="#FFFFFF" filter="url(#nodeShadow)"/>
    <rect x="195" y="192" width="5" height="36" rx="3" fill="#74B9FF"/>
    <text x="48" y="216" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#2C3E50">AI能力集成</text>
    <rect x="30" y="262" width="170" height="36" rx="18" fill="#FFFFFF" filter="url(#nodeShadow)"/>
    <rect x="195" y="262" width="5" height="36" rx="3" fill="#74B9FF"/>
    <text x="48" y="286" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#2C3E50">安全合规建设</text>

    <!-- 分支4: 运营 (左下) -->
    <rect x="280" y="490" width="100" height="60" rx="30" fill="#E17055" filter="url(#nodeShadow)"/>
    <text x="330" y="527" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="15" font-weight="700" fill="#FFFFFF">运营</text>
    <rect x="30" y="432" width="170" height="36" rx="18" fill="#FFFFFF" filter="url(#nodeShadow)"/>
    <rect x="195" y="432" width="5" height="36" rx="3" fill="#E17055"/>
    <text x="48" y="456" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#2C3E50">用户增长策略</text>
    <rect x="30" y="502" width="170" height="36" rx="18" fill="#FFFFFF" filter="url(#nodeShadow)"/>
    <rect x="195" y="502" width="5" height="36" rx="3" fill="#E17055"/>
    <text x="48" y="526" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#2C3E50">供应链优化</text>
    <rect x="30" y="572" width="170" height="36" rx="18" fill="#FFFFFF" filter="url(#nodeShadow)"/>
    <rect x="195" y="572" width="5" height="36" rx="3" fill="#E17055"/>
    <text x="48" y="596" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#2C3E50">数据驱动决策</text>

    <!-- 底部注释 -->
    <text x="640" y="690" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12" fill="#BDC3C7">中心主题向四大维度发散，每个维度下展开细分子项</text>
</svg>