<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <!-- 
    等距阶梯图模板
    用途: 递进阶段、成长路径、成熟度模型
    适用场景: 数字化转型阶段、能力成熟度、战略里程碑递进
    支持: 6级阶梯 (推荐4-7级)
    -->
    
    <defs>
        <!-- 阴影 -->
        <filter id="stairShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
            <feOffset dx="2" dy="3" result="offsetblur"/>
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.15"/>
            </feComponentTransfer>
            <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <!-- 背景 -->
    <rect width="1280" height="720" fill="#FFFFFF"/>
    
    <!-- 标题区域 -->
    <text x="60" y="65" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="32" font-weight="700" fill="#1A252F" letter-spacing="-0.5">数字化转型六阶段</text>
    <text x="60" y="95" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="16" fill="#7F8C8D">Digital Transformation Roadmap · 从基础到引领的递进路径</text>
    
    <!-- 3D等距阶梯 (从左下到右上递增) -->
    <!-- 阶梯1 (最低, 左下) -->
    <g transform="translate(80, 480)" filter="url(#stairShadow)">
        <!-- 顶面 -->
        <polygon points="0,0 130,-38 260,0 130,38" fill="#E74C3C"/>
        <!-- 正面 -->
        <polygon points="0,0 0,72 130,110 130,38" fill="#C0392B"/>
        <!-- 侧面 -->
        <polygon points="130,38 130,110 260,72 260,0" fill="#A93226"/>
        <!-- 编号 -->
        <text x="130" y="10" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="26" font-weight="800" fill="#FFFFFF">1</text>
        <!-- 标签 -->
        <text x="130" y="148" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" font-weight="700" fill="#1A252F">基础信息化</text>
        <text x="130" y="168" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="11" fill="#7F8C8D">IT基础设施建设</text>
    </g>
    
    <!-- 阶梯2 -->
    <g transform="translate(230, 410)" filter="url(#stairShadow)">
        <polygon points="0,0 130,-38 260,0 130,38" fill="#E67E22"/>
        <polygon points="0,0 0,72 130,110 130,38" fill="#D35400"/>
        <polygon points="130,38 130,110 260,72 260,0" fill="#BA4A00"/>
        <text x="130" y="10" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="26" font-weight="800" fill="#FFFFFF">2</text>
        <text x="130" y="148" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" font-weight="700" fill="#1A252F">流程数字化</text>
        <text x="130" y="168" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="11" fill="#7F8C8D">核心业务在线化</text>
    </g>
    
    <!-- 阶梯3 -->
    <g transform="translate(380, 340)" filter="url(#stairShadow)">
        <polygon points="0,0 130,-38 260,0 130,38" fill="#F1C40F"/>
        <polygon points="0,0 0,72 130,110 130,38" fill="#D4AC0D"/>
        <polygon points="130,38 130,110 260,72 260,0" fill="#B7950B"/>
        <text x="130" y="10" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="26" font-weight="800" fill="#FFFFFF">3</text>
        <text x="130" y="148" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" font-weight="700" fill="#1A252F">数据驱动</text>
        <text x="130" y="168" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="11" fill="#7F8C8D">决策数据化运营</text>
    </g>
    
    <!-- 阶梯4 -->
    <g transform="translate(530, 270)" filter="url(#stairShadow)">
        <polygon points="0,0 130,-38 260,0 130,38" fill="#2ECC71"/>
        <polygon points="0,0 0,72 130,110 130,38" fill="#27AE60"/>
        <polygon points="130,38 130,110 260,72 260,0" fill="#1E8449"/>
        <text x="130" y="10" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="26" font-weight="800" fill="#FFFFFF">4</text>
        <text x="130" y="148" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" font-weight="700" fill="#1A252F">智能赋能</text>
        <text x="130" y="168" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="11" fill="#7F8C8D">AI+业务深度融合</text>
    </g>
    
    <!-- 阶梯5 -->
    <g transform="translate(680, 200)" filter="url(#stairShadow)">
        <polygon points="0,0 130,-38 260,0 130,38" fill="#3498DB"/>
        <polygon points="0,0 0,72 130,110 130,38" fill="#2980B9"/>
        <polygon points="130,38 130,110 260,72 260,0" fill="#21618C"/>
        <text x="130" y="10" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="26" font-weight="800" fill="#FFFFFF">5</text>
        <text x="130" y="148" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" font-weight="700" fill="#1A252F">生态连接</text>
        <text x="130" y="168" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="11" fill="#7F8C8D">产业链协同平台</text>
    </g>
    
    <!-- 阶梯6 (最高, 右上) -->
    <g transform="translate(830, 130)" filter="url(#stairShadow)">
        <polygon points="0,0 130,-38 260,0 130,38" fill="#9B59B6"/>
        <polygon points="0,0 0,72 130,110 130,38" fill="#8E44AD"/>
        <polygon points="130,38 130,110 260,72 260,0" fill="#7D3C98"/>
        <text x="130" y="10" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="26" font-weight="800" fill="#FFFFFF">6</text>
        <text x="130" y="148" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" font-weight="700" fill="#1A252F">全面引领</text>
        <text x="130" y="168" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="11" fill="#7F8C8D">行业标准制定者</text>
    </g>
    
    <!-- 向上箭头装饰 -->
    <line x1="1145" y1="620" x2="1145" y2="145" stroke="#9B59B6" stroke-width="2" stroke-opacity="0.2"/>
    <polygon points="1145,140 1135,158 1155,158" fill="#9B59B6" fill-opacity="0.3"/>
    <text x="1160" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="13" fill="#BDC3C7" transform="rotate(-90,1160,400)">成熟度递增</text>
    
    <!-- 底部总结 -->
    <rect x="60" y="650" width="1060" height="50" rx="10" fill="#F8F9FA"/>
    <text x="590" y="680" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="14" fill="#7F8C8D">从基础信息化到全面引领，六大阶梯逐步构建企业数字化核心竞争力</text>
</svg>