# ============================================================================
# 8.1 权限系统（Permissions）
# ============================================================================
# 分层权限模型，控制 Agent 对工具的访问权限。
# 每个工具有一个所需权限级别，会话模式决定调用是被允许、拒绝还是需要交互确认。
#
# 五个权限等级（从严到宽）:
#   read_only          — 仅允许读取类工具
#   workspace_write    — 允许读取 + 工作区范围内的写入
#   danger_full_access — 允许所有工具（但不自动放行）
#   prompt             — 高风险工具需要交互式审批
#   allow              — 允许所有工具（默认，向后兼容）

permissions:
  enabled: true
  mode: "allow"            # 默认 allow 模式，与旧版行为完全兼容
  # 按工具名单独设置权限等级:
  # tool_overrides:
  #   bash: "danger_full_access"       # bash 需要最高权限
  #   write_file: "workspace_write"    # 写文件需要工作区写权限

# ============================================================================
# 8.2 Hook 治理层（Hooks）
# ============================================================================
# 在工具调用前后插入可编程拦截点，用于审计、修改输入、拒绝执行或注入反馈。
# 支持两种 Hook 形式:
#   1. 外部 Shell 命令（兼容 Claude Code 协议）
#   2. Python 可调用对象
#
# 外部 Hook 协议:
#   stdin:  JSON 载荷 {event, tool_name, input, output, is_error}
#   环境变量: HOOK_EVENT, HOOK_TOOL_NAME, HOOK_TOOL_INPUT
#   退出码: 0=允许, 2=拒绝, 其他=警告（不阻断）

hooks:
  enabled: true
  # 取消注释以下配置来启用 Hook:
  # pre_tool_use:                                    # 工具调用前
  #   - command: "python scripts/check_sensitive_paths.py"
  #     tools: ["bash", "file_write"]                # 仅对指定工具生效
  #   - use: "deerflow.hooks.builtins:audit_logger"  # Python Hook
  # post_tool_use:                                   # 工具调用后（成功时）
  #   - command: "python scripts/post_audit.py"
  # post_tool_use_failure: []                        # 工具调用后（失败时）

# ============================================================================
# 8.3 上下文压缩（Context Compaction）
# ============================================================================
# 确定性对话压缩引擎，零 LLM 调用成本。
# 当估算 token 数超过阈值时，自动将旧消息替换为结构化摘要，
# 同时完整保留最近的消息。与 6.2 的 Summarization 不同，
# 这里不调用 LLM 生成摘要，而是用确定性算法压缩。

# context:
#   compaction:
#     enabled: false
#     max_estimated_tokens: 80000      # 触发压缩的 token 阈值
#     preserve_recent_messages: 6      # 保留最近的消息数

# ============================================================================
# 8.4 插件系统（Plugins）
# ============================================================================
# 基于清单文件（plugin.json）的声明式插件系统。
# 插件可以贡献工具、Hook 和运行时约束。

# plugins:
#   enabled: false
#   directories:                       # 插件搜索目录
#     - "~/.deerflow/plugins"
#     - ".deerflow/plugins"

# ============================================================================
# 8.5 护栏（Guardrails）
# ============================================================================
# 工具调用前的可选授权检查。启用后，每次工具调用都会经过配置的 Provider 审核。
# 提供三种方案:
#   方案一: 内置白名单（AllowlistProvider，零外部依赖）
#   方案二: OAP 护照协议（开放标准，任何兼容实现均可）
#   方案三: 自定义 Provider（实现 evaluate/aevaluate 方法的任意类）
#
# 详细文档: backend/docs/GUARDRAILS.md

# --- 方案一: 内置白名单 ---
# guardrails:
#   enabled: true
#   provider:
#     use: deerflow.guardrails.builtin:AllowlistProvider
#     config:
#       denied_tools: ["bash", "write_file"]    # 禁止使用的工具列表

# --- 方案二: OAP 护照协议 ---
# 安装: pip install aport-agent-guardrails && aport setup --framework deerflow
# guardrails:
#   enabled: true
#   provider:
#     use: aport_guardrails.providers.generic:OAPGuardrailProvider

# --- 方案三: 自定义 Provider ---
# guardrails:
#   enabled: true
#   provider:
#     use: my_package:MyGuardrailProvider
#     config:
#       key: value
