# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                    DeerFlow 应用配置文件 (config.yaml)                      ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
#
# 使用说明:
#   1. 复制本文件为 config.yaml:  cp config.example.yaml config.yaml
#   2. 根据你的环境修改 config.yaml 中的配置项
#   3. 配置文件默认路径为当前工作目录下的 config.yaml
#      可通过环境变量 DEER_FLOW_CONFIG_PATH 指定其他路径
#
# 语法约定:
#   - 所有值均支持环境变量引用，例如: api_key: $OPENAI_API_KEY
#   - use 字段格式: "包名.子包名.模块名:类名" (Python import 路径)
#   - 被注释掉的配置项(#)为可选项，取消注释即可启用


# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  第一部分：基础设置                                                         ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ============================================================================
# 1.1 配置版本号
# ============================================================================
# 用于检测配置文件是否过期。当配置结构发生变化时会递增此版本号。
# 如果你的 config.yaml 版本号低于此值，运行 make config-upgrade 可自动合并新字段。
config_version: 5

# ============================================================================
# 1.2 日志级别
# ============================================================================
# 控制 deerflow 模块的日志输出详细程度
# 可选值: debug（调试）/ info（信息）/ warning（警告）/ error（错误）
log_level: info

# ============================================================================
# 1.3 Token 用量追踪
# ============================================================================
# 启用后，每次 LLM 调用都会记录 token 消耗（输入/输出/总计）
# 日志通过 TokenUsageMiddleware 以 info 级别输出，方便监控成本
token_usage:
  enabled: false


# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  第二部分：大模型配置                                                       ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ============================================================================
# 2.1 模型列表
# ============================================================================
# 配置 Agent 可使用的大语言模型。列表中第一个模型为默认模型。
# 每个模型需要指定:
#   name          - 内部标识名（唯一）
#   display_name  - 前端显示名称
#   use           - LangChain 模型类的 Python 路径
#   model         - 模型 ID（传给 API 的模型名）
#   api_key       - API 密钥（建议用 $ENV_VAR 引用环境变量）
#
# 可选参数:
#   base_url / api_base       - 自定义 API 端点（用于兼容 OpenAI 的第三方服务）
#   request_timeout / timeout - 请求超时（秒）
#   max_retries               - 最大重试次数
#   max_tokens                - 单次回复最大 token 数
#   temperature               - 生成温度（0.0-2.0，越高越随机）
#   supports_vision           - 是否支持图片输入（启用 view_image 工具）
#   supports_thinking         - 是否支持思维链/推理模式
#   supports_reasoning_effort - 是否支持推理强度调节
#   when_thinking_enabled     - 启用思维链时的额外参数

models:
  # ╭─────────────────────────────────────────────────────────────────────╮
  # │  默认启用的模型（通过 dmxapi.cn 中转，列表第一个为默认模型）        │
  # │  如需直连官方 API，将 base_url 改为官方地址即可                     │
  # ╰─────────────────────────────────────────────────────────────────────╯

  # --- DeepSeek Chat（默认模型，性价比高）---
  - name: DeepSeek-Chat
    display_name: DeepSeek
    use: deerflow.models.patched_deepseek:PatchedChatDeepSeek
    model: deepseek-chat
    api_key: $DEEPSEEK_API_KEY
    api_base: https://api.deepseek.com/v1    # 直连 DeepSeek 官方
    timeout: 30
    supports_thinking: false
    supports_vision: false
    max_tokens: 8192
    temperature: 0.3

  # --- Kimi K2.5（月之暗面，支持思维链 + 视觉）---
  - name: Kimi-K2.5
    display_name: Kimi K2.5
    use: deerflow.models.patched_deepseek:PatchedChatDeepSeek
    model: kimi-k2.5
    api_key: $MOONSHOT_API_KEY
    api_base: https://api.moonshot.cn/v1     # 直连月之暗面官方
    timeout: 30
    supports_thinking: true
    supports_vision: true
    max_tokens: 131072
    temperature: 0.6
    when_thinking_enabled:
      extra_body:
        thinking:
          type: enabled

  # --- Gemini 3.1 Pro（通过 dmxapi 中转）---
  - name: Gemini-3.1-Pro
    display_name: Gemini 3.1 Pro
    use: deerflow.models.patched_openai:PatchedChatOpenAI
    model: gemini-3.1-pro-preview
    api_key: $GEMINI_API_KEY
    base_url: https://www.dmxapi.cn/v1       # dmxapi 中转
    timeout: 30
    supports_thinking: true
    supports_vision: true
    max_tokens: 131072
    temperature: 1.0
    when_thinking_enabled:
      extra_body:
        thinking:
          type: enabled

  # --- GPT 5.4（通过 dmxapi 中转）---
  - name: GPT-5.4
    display_name: GPT 5.4
    use: langchain_openai:ChatOpenAI
    model: gpt-5.4
    api_key: $OPENAI_API_KEY
    base_url: https://www.dmxapi.cn/v1       # dmxapi 中转
    timeout: 30
    supports_thinking: true
    supports_vision: true
    max_tokens: 131072
    temperature: 1.0
    when_thinking_enabled:
      extra_body:
        thinking:
          type: enabled

  # --- Claude Sonnet 4.6（通过 dmxapi 中转）---
  - name: claude-sonnet-4-6
    display_name: Claude Sonnet 4.6
    use: langchain_anthropic:ChatAnthropic
    model: claude-sonnet-4-6-thinking
    api_key: $ANTHROPIC_API_KEY
    base_url: https://www.dmxapi.cn           # dmxapi 中转（注意无 /v1）
    max_tokens: 128000
    supports_vision: true
    supports_thinking: true
    when_thinking_enabled:
      thinking:
        type: enabled
        budget_tokens: 10000

  # --- Claude Opus 4.6（通过 dmxapi 中转）---
  - name: claude-opus-4-6
    display_name: Claude Opus 4.6
    use: langchain_anthropic:ChatAnthropic
    model: claude-opus-4-6-thinking
    api_key: $ANTHROPIC_API_KEY
    base_url: https://www.dmxapi.cn           # dmxapi 中转
    max_tokens: 128000
    supports_vision: true
    supports_thinking: true
    when_thinking_enabled:
      thinking:
        type: enabled
        budget_tokens: 10000

  # ╭─────────────────────────────────────────────────────────────────────╮
  # │  以下为更多可选模型示例（取消注释即可启用）                         │
  # ╰─────────────────────────────────────────────────────────────────────╯

  # --- 火山引擎 / 豆包（字节跳动）---
  # - name: doubao-seed-1.8
  #   display_name: Doubao-Seed-1.8
  #   use: deerflow.models.patched_deepseek:PatchedChatDeepSeek
  #   model: doubao-seed-1-8-251228
  #   api_base: https://ark.cn-beijing.volces.com/api/v3
  #   api_key: $VOLCENGINE_API_KEY
  #   timeout: 600.0
  #   max_retries: 2
  #   supports_thinking: true
  #   supports_vision: true
  #   supports_reasoning_effort: true
  #   when_thinking_enabled:
  #     extra_body:
  #       thinking:
  #         type: enabled

  # --- Novita AI（OpenAI 兼容，https://novita.ai）---
  # - name: novita-deepseek-r1
  #   display_name: DeepSeek R1 (Novita)
  #   use: langchain_openai:ChatOpenAI
  #   model: deepseek/deepseek-r1-0528
  #   api_key: $NOVITA_API_KEY
  #   base_url: https://api.novita.ai/v3/openai
  #   request_timeout: 600.0
  #   max_retries: 2
  #   max_tokens: 4096
  #   supports_vision: true
  #   supports_thinking: true

  # --- MiniMax（国际版 / 中国区）---
  # 高性能模型，204K 上下文窗口
  # 国际版: base_url: https://api.minimax.io/v1
  # 中国区: base_url: https://api.minimaxi.com/v1
  # - name: minimax-m2.7
  #   display_name: MiniMax M2.7
  #   use: langchain_openai:ChatOpenAI
  #   model: MiniMax-M2.7
  #   api_key: $MINIMAX_API_KEY
  #   base_url: https://api.minimaxi.com/v1
  #   request_timeout: 600.0
  #   max_retries: 2
  #   max_tokens: 4096
  #   temperature: 1.0          # MiniMax 要求 temperature 在 (0.0, 1.0] 范围内
  #   supports_vision: true
  #   supports_thinking: true

  # --- OpenRouter（OpenAI 兼容的模型聚合网关）---
  # 通过 OpenRouter 可以用统一 API 访问多家模型
  # - name: openrouter-gemini-2.5-flash
  #   display_name: Gemini 2.5 Flash (OpenRouter)
  #   use: langchain_openai:ChatOpenAI
  #   model: google/gemini-2.5-flash-preview
  #   api_key: $OPENAI_API_KEY
  #   base_url: https://openrouter.ai/api/v1
  #   request_timeout: 600.0
  #   max_retries: 2
  #   max_tokens: 4096
  #   supports_vision: true
  #   supports_thinking: true


# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  第三部分：工具配置                                                         ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ============================================================================
# 3.1 工具分组
# ============================================================================
# 将工具按功能分组，便于管理和权限控制。
# Agent 可以按组加载工具，自定义 Agent 也可以在 config.yaml 中指定加载哪些组。

tool_groups:
  - name: web          # 网络搜索与抓取
  - name: file:read    # 文件读取
  - name: file:write   # 文件写入
  - name: bash         # Shell 命令执行

# ============================================================================
# 3.2 工具列表
# ============================================================================
# 配置 Agent 可使用的具体工具。每个工具属于一个 group。
# 同名工具只能启用一个（例如 web_search 只能选一个搜索引擎）。

tools:
  # ---- 网络搜索工具（三选一）----

  # DuckDuckGo 搜索（默认，无需 API Key）
  - name: web_search
    group: web
    use: deerflow.community.ddg_search.tools:web_search_tool
    max_results: 5

  # Tavily 搜索（需要 TAVILY_API_KEY，搜索质量更好）
  # - name: web_search
  #   group: web
  #   use: deerflow.community.tavily.tools:web_search_tool
  #   max_results: 5

  # InfoQuest 搜索（国产搜索引擎，需要 INFOQUEST_API_KEY）
  # - name: web_search
  #   group: web
  #   use: deerflow.community.infoquest.tools:web_search_tool
  #   search_time_range: 10    # 搜索时间范围（天），-1 表示不限

  # ---- 网页抓取工具（二选一）----

  # Jina AI Reader（默认，需要 JINA_API_KEY）
  - name: web_fetch
    group: web
    use: deerflow.community.jina_ai.tools:web_fetch_tool
    timeout: 10                # 抓取超时（秒）

  # InfoQuest 抓取
  # - name: web_fetch
  #   group: web
  #   use: deerflow.community.infoquest.tools:web_fetch_tool
  #   timeout: 10              # 整体超时（秒），-1 表示不限
  #   navigation_timeout: 30   # 页面导航超时（秒），-1 表示不限

  # ---- 图片搜索工具（二选一）----

  # DuckDuckGo 图片搜索（默认，无需 API Key）
  - name: image_search
    group: web
    use: deerflow.community.image_search.tools:image_search_tool
    max_results: 5

  # InfoQuest 图片搜索
  # - name: image_search
  #   group: web
  #   use: deerflow.community.infoquest.tools:image_search_tool
  #   image_search_time_range: 10   # 搜索时间范围（天），-1 表示不限
  #   image_size: "i"               # 图片尺寸: "l"(大) / "m"(中) / "i"(图标)

  # ---- 文件操作工具 ----

  - name: ls                   # 列出目录内容
    group: file:read
    use: deerflow.sandbox.tools:ls_tool

  - name: read_file            # 读取文件
    group: file:read
    use: deerflow.sandbox.tools:read_file_tool

  - name: write_file           # 写入文件
    group: file:write
    use: deerflow.sandbox.tools:write_file_tool

  - name: str_replace          # 字符串替换（精确编辑文件）
    group: file:write
    use: deerflow.sandbox.tools:str_replace_tool

  # ---- Shell 执行工具 ----
  # 仅在使用隔离沙箱或 sandbox.allow_host_bash: true 时生效
  - name: bash
    group: bash
    use: deerflow.sandbox.tools:bash_tool

# ============================================================================
# 3.3 工具搜索（延迟加载）
# ============================================================================
# 启用后，MCP 工具不会在启动时全部加载到 Agent 上下文中，
# 而是通过 tool_search 工具按需搜索和加载。
# 适用于 MCP 服务器暴露大量工具的场景，可显著减少 token 消耗。

tool_search:
  enabled: false


# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  第四部分：沙箱与执行环境                                                   ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ============================================================================
# 4.1 沙箱配置
# ============================================================================
# Agent 执行 bash 命令、读写文件时的运行环境。
# 提供三种模式，按安全性从低到高排列:
#   方案一: 本地沙箱（直接在宿主机执行，适合个人开发）
#   方案二: 容器沙箱（Docker/Apple Container 隔离，适合多用户）
#   方案三: Provisioner 托管沙箱（K3s Pod 隔离，适合生产环境）

# --- 方案一: 本地沙箱 ---
# 直接在宿主机上执行命令，无隔离。仅适合完全信任的单用户本地开发。
# 如需使用本地沙箱，注释掉下方的方案二，取消注释以下配置:
# sandbox:
#   use: deerflow.sandbox.local:LocalSandboxProvider
#   allow_host_bash: false
#   bash_output_max_chars: 20000
#   read_file_output_max_chars: 50000

# --- 方案二: 容器沙箱（默认启用）---
# 在隔离容器中执行命令。macOS 优先使用 Apple Container，其次 Docker。
sandbox:
  use: deerflow.community.aio_sandbox:AioSandboxProvider
  image: enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest
#
#   # 容器基础端口（默认 8080）
#   # port: 8080
#
#   # 最大并发容器数（默认 3）。达到上限时自动淘汰最久未使用的容器。
#   # replicas: 3
#
#   # 容器名称前缀（默认 scientific-tumbleweed-sandbox）
#   # container_prefix: scientific-tumbleweed-sandbox
#
#   # 容器空闲超时（秒，默认 600 = 10 分钟）。设为 0 表示不超时。
#   # idle_timeout: 600
#
#   # 额外挂载目录（宿主机目录映射到容器内）
#   # 注意: skills 目录会自动从 skills.path 挂载到 skills.container_path
#   # mounts:
#   #   - host_path: /path/on/host        # 宿主机路径
#   #     container_path: /home/user/shared # 容器内路径
#   #     read_only: false                  # 是否只读
#
#   # 注入到容器的环境变量（$VAR 会从宿主机环境变量解析）
#   # environment:
#   #   NODE_ENV: production
#   #   API_KEY: $MY_API_KEY

# --- 方案三: Provisioner 托管沙箱（docker-compose-dev 模式）---
# 每个 sandbox_id 分配独立的 K3s Pod，由 Provisioner 服务管理。
# 适合生产环境或需要更好隔离性和可扩展性的场景。
# sandbox:
#   use: deerflow.community.aio_sandbox:AioSandboxProvider
#   provisioner_url: http://provisioner:8002


# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  第五部分：Agent 能力配置                                                   ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ============================================================================
# 5.1 子代理（Subagents）
# ============================================================================
# 子代理是由主 Agent（lead_agent）委派任务的后台工作者。
# 主 Agent 可以将复杂任务分解为多个子任务并行执行。

# subagents:
#   # 所有子代理的默认超时时间（秒，默认 900 = 15 分钟）
#   timeout_seconds: 900
#
#   # 按子代理类型单独设置超时
#   agents:
#     general-purpose:
#       timeout_seconds: 600   # 通用子代理: 10 分钟
#     bash:
#       timeout_seconds: 300   # Bash 子代理: 5 分钟

# ============================================================================
# 5.2 ACP 外部代理
# ============================================================================
# 配置外部 ACP（Agent Communication Protocol）兼容的代理。
# 可以将 Claude Code、Codex 等外部 AI 工具作为子代理调用。

# acp_agents:
#   claude_code:
#     # 需要安装 ACP 适配器（标准 claude CLI 不直接支持 ACP）
#     command: npx
#     args: ["-y", "@zed-industries/claude-agent-acp"]
#     description: Claude Code 用于代码实现、重构和调试
#     model: null
#     # auto_approve_permissions: false  # 设为 true 自动批准权限请求
#     # env:
#     #   ANTHROPIC_API_KEY: $ANTHROPIC_API_KEY
#
#   codex:
#     command: npx
#     args: ["-y", "@zed-industries/codex-acp"]
#     description: Codex CLI 用于仓库任务和代码生成
#     model: null
#     # env:
#     #   OPENAI_API_KEY: $OPENAI_API_KEY

# ============================================================================
# 5.3 技能（Skills）
# ============================================================================
# 技能是预定义的专业工作流（Markdown 格式的 SKILL.md 文件）。
# Agent 会根据用户请求自动选择合适的技能执行。

skills:
  # 技能目录路径（相对于项目根目录或绝对路径）
  # 默认: ../skills（相对于 backend 目录）
  # path: /absolute/path/to/custom/skills

  # 技能在沙箱容器中的挂载路径
  # Agent 通过此路径访问技能文件（本地和 Docker 沙箱通用）
  container_path: /mnt/skills


# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  第六部分：对话管理                                                         ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ============================================================================
# 6.1 自动标题生成
# ============================================================================
# 在首次对话交互后，自动为会话生成简短标题。

title:
  enabled: true
  max_words: 6             # 标题最大词数
  max_chars: 60            # 标题最大字符数
  model_name: null         # 用于生成标题的模型（null = 使用默认模型，即列表中第一个）

# ============================================================================
# 6.2 对话摘要（Summarization）
# ============================================================================
# 当对话历史接近模型 token 上限时，自动压缩旧消息为摘要。
# 这样可以在长对话中保持上下文，避免超出模型输入限制。

summarization:
  enabled: true

  # 用于生成摘要的模型（null = 使用默认模型）
  # 建议使用轻量低成本模型，如 gpt-4o-mini
  model_name: null

  # 触发条件 —— 满足任一条件即触发摘要（OR 逻辑）
  trigger:
    # 当 token 数达到此值时触发
    - type: tokens
      value: 15564
    # 当消息数达到此值时触发
    # - type: messages
    #   value: 50
    # 当达到模型最大输入 token 的指定比例时触发
    # - type: fraction
    #   value: 0.8

  # 摘要后保留策略 —— 保留多少最近的历史
  keep:
    type: messages          # 按消息数保留
    value: 10               # 保留最近 10 条消息
    # type: tokens          # 或按 token 数保留
    # value: 3000
    # type: fraction        # 或按模型最大 token 的比例保留
    # value: 0.3

  # 准备摘要时保留的最大 token 数（null = 不裁剪，不建议用于超长对话）
  trim_tokens_to_summarize: 15564

  # 自定义摘要提示词模板（null = 使用 LangChain 默认提示词）
  summary_prompt: null

# ============================================================================
# 6.3 记忆系统（Memory）
# ============================================================================
# 全局记忆机制，跨会话存储用户偏好和关键信息，实现个性化回复。

memory:
  enabled: true
  storage_path: memory.json         # 存储路径（相对于 backend 目录）
  debounce_seconds: 30              # 队列更新等待时间（秒），避免频繁写入
  model_name: null                  # 用于提取记忆的模型（null = 默认模型）
  max_facts: 100                    # 最大存储事实数
  fact_confidence_threshold: 0.7    # 存储事实的最低置信度（0.0-1.0）
  injection_enabled: true           # 是否将记忆注入系统提示词
  max_injection_tokens: 2000        # 注入记忆的最大 token 数

# ============================================================================
# 6.4 状态持久化（Checkpointer）
# ============================================================================
# 配置嵌入式 DeerFlowClient 的状态持久化方式。
# 注意: LangGraph Server 有自己的状态管理，此配置不影响它。
# 启用后，多轮对话状态可在进程重启后恢复。
#
# 支持三种类型:
#   memory   - 仅内存（默认）。进程退出后状态丢失。
#   sqlite   - SQLite 文件持久化。适合单进程部署。
#   postgres - PostgreSQL 持久化。适合多进程生产部署。

checkpointer:
  type: sqlite
  connection_string: checkpoints.db

# PostgreSQL 示例:
# checkpointer:
#   type: postgres
#   connection_string: postgresql://user:password@localhost:5432/deerflow


