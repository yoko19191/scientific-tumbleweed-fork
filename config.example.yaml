# ============================================================================
# 7.1 即时通讯渠道
# ============================================================================
# 将 Agent 接入飞书、Slack、Telegram 等 IM 平台。
# 所有渠道均使用出站连接（WebSocket 或轮询），无需公网 IP。

# channels:
#   # LangGraph Server 地址（默认 http://localhost:2024）
#   # Docker 部署时使用容器服务名: http://langgraph:2024
#   langgraph_url: http://localhost:2024
#
#   # Gateway API 地址（默认 http://localhost:8001）
#   # Docker 部署时使用容器服务名: http://gateway:8001
#   gateway_url: http://localhost:8001
#
#   # 所有 IM 渠道的默认会话设置
#   session:
#     assistant_id: lead_agent    # 使用的 Agent（自定义 Agent 名也可以）
#     config:
#       recursion_limit: 100      # Agent 最大递归深度
#     context:
#       thinking_enabled: true    # 是否启用思维链
#       is_plan_mode: false       # 是否启用规划模式
#       subagent_enabled: false   # 是否启用子代理
#
#   # ---- 飞书 / Lark ----
#   feishu:
#     enabled: false
#     app_id: $FEISHU_APP_ID
#     app_secret: $FEISHU_APP_SECRET
#     # domain: https://open.feishu.cn       # 中国区（默认）
#     # domain: https://open.larksuite.com   # 国际版
#
#   # ---- Slack ----
#   slack:
#     enabled: false
#     bot_token: $SLACK_BOT_TOKEN     # xoxb-... 格式
#     app_token: $SLACK_APP_TOKEN     # xapp-... 格式（Socket Mode）
#     allowed_users: []               # 空列表 = 允许所有用户
#
#   # ---- Telegram ----
#   telegram:
#     enabled: false
#     bot_token: $TELEGRAM_BOT_TOKEN
#     allowed_users: []               # 空列表 = 允许所有用户
#
#     # 可选: 渠道级别的会话设置覆盖
#     session:
#       assistant_id: mobile-agent
#       context:
#         thinking_enabled: false
#
#       # 可选: 按用户 ID 单独设置
#       users:
#         "123456789":
#           assistant_id: vip-agent
#           config:
#             recursion_limit: 150
#           context:
#             thinking_enabled: true
#             subagent_enabled: true


